name: Deploy to Cloudflare Workers

# The OpenNext adapter and Wrangler both depend on `workerd`, which ships no
# win32-arm64 binary — so the deploy cannot run on the ARM64 dev machine. It
# runs here on a Linux runner instead. Push to main to ship; or trigger by hand.
on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time; let an in-progress run finish rather than cancelling it.
concurrency:
  group: deploy-workers
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy (OpenNext → Cloudflare Workers)
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
